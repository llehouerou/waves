version: "2"
linters:
  enable:
    - bodyclose
    - copyloopvar
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forcetypeassert
    - goconst
    - gocritic
    - gomodguard
    - gosec
    - intrange
    - misspell
    - modernize
    - nestif
    - nilerr
    - nilnil
    - perfsprint
    - prealloc
    - predeclared
    - revive
    - sqlclosecheck
    - unconvert
    - unparam
    - usestdlibvars
  settings:
    gocritic:
      disabled-checks:
        - hugeParam
      enabled-tags:
        - diagnostic
        - style
        - performance
    gosec:
      excludes:
        - G115 # integer overflow conversions - too noisy for safe narrowing casts
        - G117 # struct field names matching secret patterns - false positives on config structs
        - G703 # path traversal via taint - false positives on internal paths
        - G704 # SSRF via taint - false positives on internal HTTP clients
    revive:
      rules:
        - name: var-naming
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
